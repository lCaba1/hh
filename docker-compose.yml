services:
  postgres:
    build:
      context: ./sql
      dockerfile: Dockerfile
    container_name: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    command: sh -c "poetry run uvicorn main:app --reload --host 0.0.0.0 --port 8000"
    depends_on:
      - postgres

volumes:
  pgdata:
    driver: local
